<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JB CD Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: system-ui;
  background: #0b1020;
  color: white;
  display: flex;
  justify-content: center;
}
.container {
  max-width: 600px;
  margin: 40px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
button {
  margin-top: 20px;
  padding: 10px;
  background: #4f46e5;
  color: white;
  border: none;
}
</style>
</head>

<body>
<div class="container">
  <h1>JB CD Finder</h1>
  <div id="app"></div>
</div>

<script>
const URL = "PASTE_YOUR_WEB_APP_URL_HERE";

let step = 0;
const answers = {};

const questions = [
  { id: "firstName", text: "First name?" },
  { id: "email", text: "Email?" },
  { id: "amount", text: "Amount?", options: ["500","1000","5000"] },
  { id: "timeframe", text: "Timeframe?", options: ["3mo","6mo","12mo"] }
];

const app = document.getElementById("app");

function render() {
  const q = questions[step];

  let input = "";

  if (q.options) {
    input = `<select id="val">
      <option value="">Select</option>
      ${q.options.map(o=>`<option>${o}</option>`).join("")}
    </select>`;
  } else {
    input = `<input id="val" />`;
  }

  app.innerHTML = `
    <div>${q.text}</div>
    ${input}
    <button onclick="next()">Next</button>
  `;
}

function next() {
  const val = document.getElementById("val").value;
  if (!val) return;

  answers[questions[step].id] = val;

  if (step < questions.length - 1) {
    step++;
    render();
  } else {
    submit();
  }
}

function submit() {
  fetch(URL, {
    method: "POST",
    body: JSON.stringify(answers)
  })
  .then(r=>r.text())
  .then(res=>{
    app.innerHTML = "Done ✔";
  })
  .catch(()=>{
    app.innerHTML = "Error sending";
  });
}

render();
</script>
</body>
</html>
